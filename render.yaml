services:
  # JoeKym Labs Single Page Application (SPA)
  - type: web
    name: joekymlabs
    env: static
    # Command to build the React app
    buildCommand: npm install && npm run build
    # Vite outputs to 'dist' inside the 'app' directory
    staticPublishDir: dist
    # Root directory for the SPA
    rootDir: app
    # SPA routing: Redirect all requests to index.html to handle client-side routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
